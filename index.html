<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge at Sea — Ask Our Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-light: #122040;
    --gold: #c8aa5a;
    --gold-light: #d4bc7a;
    --cream: #f0e8d0;
    --cream-light: #f8f4ec;
    --white: #ffffff;
    --text-muted: #8a9ab5;
    --bubble-user: #1a3050;
    --bubble-bot: #122040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ── Floating launcher button ── */
  #launcher {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #a8883a);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(200,170,90,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #launcher:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 32px rgba(200,170,90,0.6);
  }
  #launcher svg { width: 30px; height: 30px; fill: var(--navy); }
  #launcher .close-icon { display: none; }
  #launcher.open .chat-icon { display: none; }
  #launcher.open .close-icon { display: block; }

  /* ── Chat window ── */
  #chat-window {
    position: fixed;
    bottom: 104px;
    right: 28px;
    width: 380px;
    max-width: calc(100vw - 40px);
    height: 560px;
    max-height: calc(100vh - 130px);
    background: var(--navy-light);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,170,90,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 999;
    transform: scale(0.92) translateY(16px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
  }
  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* ── Header ── */
  .chat-header {
    background: linear-gradient(135deg, var(--navy) 0%, #0d1f3c 100%);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid rgba(200,170,90,0.15);
    flex-shrink: 0;
  }
  .avatar {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--gold), #a8883a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--navy);
    font-weight: 700;
    flex-shrink: 0;
  }
  .header-text h3 {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--cream);
    font-weight: 600;
    line-height: 1.2;
  }
  .header-text p {
    font-size: 12px;
    color: var(--gold);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    background: #4caf82;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── Messages area ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(200,170,90,0.3); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    margin-top: 2px;
  }
  .message.bot .msg-avatar {
    background: linear-gradient(135deg, var(--gold), #a8883a);
    color: var(--navy);
    font-family: 'Playfair Display', serif;
  }
  .message.user .msg-avatar {
    background: var(--bubble-user);
    color: var(--text-muted);
    border: 1px solid rgba(200,170,90,0.2);
  }

  .bubble {
    max-width: 82%;
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    letter-spacing: 0.1px;
  }
  .message.bot .bubble {
    background: var(--bubble-bot);
    color: var(--cream);
    border-radius: 4px 16px 16px 16px;
    border: 1px solid rgba(200,170,90,0.1);
  }
  .message.user .bubble {
    background: linear-gradient(135deg, #1e4080, #163060);
    color: var(--white);
    border-radius: 16px 4px 16px 16px;
  }

  /* Typing indicator */
  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Suggestion chips */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 14px;
    flex-shrink: 0;
  }
  .chip {
    background: rgba(200,170,90,0.1);
    border: 1px solid rgba(200,170,90,0.3);
    color: var(--gold-light);
    padding: 7px 13px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    font-family: 'Lato', sans-serif;
    white-space: nowrap;
  }
  .chip:hover {
    background: rgba(200,170,90,0.2);
    border-color: var(--gold);
  }

  /* ── Input area ── */
  .chat-input {
    padding: 14px 16px;
    border-top: 1px solid rgba(200,170,90,0.12);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
    background: rgba(0,0,0,0.15);
  }
  #user-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,170,90,0.2);
    border-radius: 12px;
    padding: 11px 14px;
    color: var(--cream);
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 100px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #user-input::placeholder { color: var(--text-muted); }
  #user-input:focus { border-color: rgba(200,170,90,0.5); }

  #send-btn {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--gold), #a8883a);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(200,170,90,0.4); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 18px; height: 18px; fill: var(--navy); }

  .powered-by {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    padding: 6px 0 10px;
    letter-spacing: 0.3px;
  }

  /* ── Standalone demo page ── */
  .demo-page {
    text-align: center;
    color: var(--cream);
    max-width: 480px;
  }
  .demo-page h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .demo-page p {
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .demo-page .hint {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,170,90,0.1);
    border: 1px solid rgba(200,170,90,0.25);
    padding: 10px 18px;
    border-radius: 30px;
    font-size: 13px;
    color: var(--gold-light);
  }
  .suit { font-size: 18px; }
</style>
</head>
<body>

<div class="demo-page">
  <h1>Bridge at Sea</h1>
  <p>Your AI assistant is ready to answer questions about bridge cruises, group bookings, our apps, and more.</p>
  <div class="hint">
    <span class="suit">♠</span>
    Click the gold button below to start chatting
    <span class="suit">♣</span>
  </div>
</div>

<!-- Launcher -->
<button id="launcher" onclick="toggleChat()" aria-label="Open chat">
  <svg class="chat-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 10H6v-2h12v2zm0-3H6V7h12v2z"/></svg>
  <svg class="close-icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
</button>

<!-- Chat window -->
<div id="chat-window">
  <div class="chat-header">
    <div class="avatar">B</div>
    <div class="header-text">
      <h3>Bridge at Sea Assistant</h3>
      <p><span class="status-dot"></span>Online — ask me anything</p>
    </div>
  </div>

  <div id="messages"></div>

  <div class="suggestions" id="suggestions">
    <button class="chip" onclick="sendChip(this)">Which cruises have bridge?</button>
    <button class="chip" onclick="sendChip(this)">How do group bookings work?</button>
    <button class="chip" onclick="sendChip(this)">Tell me about your apps</button>
    <button class="chip" onclick="sendChip(this)">What is Bonus Bridge?</button>
  </div>

  <div class="chat-input">
    <textarea id="user-input" placeholder="Ask about bridge cruises, apps, bookings…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered-by">Powered by Claude AI · Bridge at Sea</div>
</div>

<script>
const SYSTEM_PROMPT = `You are the friendly AI assistant for Bridge at Sea (bridgescorer.com), a platform connecting bridge players with cruise holidays.

Your role is to help visitors with questions about:
- Bridge cruises: which cruise lines offer bridge, which sailings have sea days suitable for bridge, hosted bridge programmes
- Group bookings: Bridge at Sea organises group bookings for bridge players. Members register interest via the Group Interest form at bridgescorer.com/group-interest/. We have negotiated 5% group rates with Ambassador Cruise Line for groups of 15 or more passengers.
- Affiliate cruises: we promote cruises from Ambassador Cruise Line, Fred Olsen, Cruise118, P&O, Cunard, Celebrity, Princess, Norwegian, Royal Caribbean and Carnival
- Our free bridge apps: Bridge Modes Calculator (offline PWA for scoring), DigiBid (digital bidding box), Bridge Calculator, and Cruise Finder
- Bonus Bridge: a scoring system invented by Mike Smith that rewards both declarers and defenders based on hand strength
- Membership: visitors can join at bridgescorer.com/join/ using trial code 333123
- General bridge questions

Key facts:
- Bridge at Sea is run by Mike Smith, a retired developer with 40+ years bridge experience based in Spain
- The site is bridgescorer.com
- Group Interest form: bridgescorer.com/group-interest/
- Join page: bridgescorer.com/join/
- Cruise Finder: mikes-bridge-scorer.github.io/cruise-finder/
- Contact: bridgecruising@gmail.com
- Ambassador Cruise Line offers 5% group discount for 15+ passengers
- Fred Olsen cruises are particularly popular with bridge players due to high sea day counts

Keep responses concise, warm and helpful. When relevant, direct people to the Group Interest form or Join page. Use a friendly, knowledgeable tone — like a well-travelled bridge player who knows the cruise world well.

If asked about specific pricing or booking details you don't know, suggest they email bridgecruising@gmail.com or register their interest via the form.`;

let conversationHistory = [];
let isOpen = false;

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chat-window').classList.toggle('open', isOpen);
  document.getElementById('launcher').classList.toggle('open', isOpen);
  if (isOpen && conversationHistory.length === 0) {
    setTimeout(() => addBotMessage("Hello! I'm the Bridge at Sea assistant. 🃏\n\nI can help you with bridge cruises, group bookings, our free apps, and anything else about bridgescorer.com. What would you like to know?"), 400);
  }
  if (isOpen) setTimeout(() => document.getElementById('user-input').focus(), 300);
}

function addBotMessage(text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.innerHTML = `
    <div class="msg-avatar">B</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addUserMessage(text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `
    <div class="bubble">${text.replace(/</g,'&lt;')}</div>
    <div class="msg-avatar">You</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">B</div>
    <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  hideSuggestions();
  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';

  conversationHistory.push({ role: 'user', content: text });

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': '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',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      addBotMessage(reply);
    } else {
      addBotMessage("I'm sorry, I couldn't get a response just now. Please try again or email us at bridgecruising@gmail.com");
    }
  } catch (err) {
    removeTyping();
    addBotMessage("I'm having trouble connecting at the moment. Please email bridgecruising@gmail.com and we'll be happy to help!");
  }

  btn.disabled = false;
  input.focus();
}

function sendChip(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>
</body>
</html>
